<template>
    <div class="dm-container">

        <!-- ======== Top header: title + summary + action buttons ======== -->
        <div class="dm-header">
            <div class="dm-title-block">
                <div class="dm-title">
                    <lightning-icon icon-name="utility:open_folder" size="small" class="dm-title-icon"></lightning-icon>
                    <span>Documents</span>
                </div>
                <p class="dm-summary">{headerSummary}</p>
            </div>
            <div class="dm-header-actions">
                <lightning-button variant="brand" label="Upload Files" icon-name="utility:upload" onclick={handleUploadClick}></lightning-button>
                <lightning-button variant="neutral" label="New Folder" icon-name="utility:add" onclick={handleNewFolderClick} class="slds-m-left_x-small"></lightning-button>
            </div>
        </div>

        <!-- ======== Folder cards ======== -->
        <div class="dm-folder-grid">
            <template for:each={folderCards} for:item="card">
                <div key={card.name} class={card.cssClass} data-category={card.name} onclick={handleFolderClick}>
                    <lightning-icon icon-name="utility:open_folder" size="small" class={card.iconClass}></lightning-icon>
                    <div class="folder-name">{card.name}</div>
                    <div class="folder-count">{card.fileLabel}</div>
                </div>
            </template>
        </div>

        <!-- ======== Selected folder: header + search + sort ======== -->
        <div class="dm-files-section">
            <div class="dm-files-header">
                <div class="dm-folder-title">
                    <lightning-icon icon-name="utility:open_folder" size="small" class={selectedFolderIconClass}></lightning-icon>
                    <span>{selectedFolderTitle}</span>
                    <span class="dm-folder-badge">{selectedFolderCount}</span>
                </div>
                <div class="dm-controls">
                    <lightning-input type="search" placeholder="Search files..." value={searchTerm} onchange={handleSearchChange} variant="label-hidden" class="dm-search"></lightning-input>
                    <div class="dm-sort">
                        <span class="dm-sort-label">Sort by</span>
                        <lightning-combobox value={sortField} options={sortOptions} onchange={handleSortChange} variant="label-hidden"></lightning-combobox>
                    </div>
                </div>
            </div>

            <!-- ======== Files table ======== -->
            <template if:true={hasFiles}>
                <table class="dm-table">
                    <thead>
                        <tr>
                            <th>FILE NAME</th>
                            <th>TYPE</th>
                            <th>SIZE</th>
                            <th>UPLOADED BY</th>
                            <th>DATE</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={filteredDocuments} for:item="row">
                            <tr key={row.id}>
                                <td class="dm-file-name">
                                    <lightning-icon icon-name="utility:file" size="x-small" class="file-icon"></lightning-icon>
                                    <a href="javascript:void(0);" class="dm-file-link" data-id={row.id} data-cdid={row.contentDocumentId} onclick={handleNameClick}>{row.name}</a>
                                </td>
                                <td><span class="dm-type-badge">{row.type}</span></td>
                                <td>{row.size}</td>
                                <td>{row.uploadedBy}</td>
                                <td>{row.date}</td>
                                <td class="dm-actions">
                                    <lightning-button-menu
                                        alternative-text="Actions"
                                        menu-alignment="right"
                                        icon-size="x-small"
                                        variant="border-filled"
                                        data-id={row.id}
                                        data-name={row.name}
                                        data-cdid={row.contentDocumentId}
                                        onselect={handleMenuAction}>
                                        <lightning-menu-item value="View" label="View" prefix-icon-name="utility:preview"></lightning-menu-item>
                                        <lightning-menu-item value="Download" label="Download" prefix-icon-name="utility:download"></lightning-menu-item>
                                        <lightning-menu-item value="Share" label="Share" prefix-icon-name="utility:share"></lightning-menu-item>
                                        <lightning-menu-item value="Delete" label="Delete" prefix-icon-name="utility:delete"></lightning-menu-item>
                                    </lightning-button-menu>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>

            <template if:false={hasFiles}>
                <div class="dm-empty">No files in this folder yet.</div>
            </template>
        </div>

        <!-- ======== Recent activity (placeholder for phase 3) ======== -->
        <div class="dm-activity">
            <div class="dm-activity-title">RECENT ACTIVITY</div>
            <div class="dm-activity-row">
                <lightning-icon icon-name="utility:open_folder" size="small" class="folder-icon"></lightning-icon>
                <span class="dm-activity-text">Default folders created automatically for record</span>
                <span class="dm-activity-time">3d ago</span>
            </div>
        </div>

        <!-- ======== Upload modal ======== -->
        <template if:true={showUploadModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={closeUploadModal} title="Close">
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium">Upload File</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-combobox
                            name="folder"
                            label="Folder"
                            value={uploadCategory}
                            options={folderOptions}
                            onchange={handleUploadCategoryChange}
                            class="slds-m-bottom_small">
                        </lightning-combobox>
                        <div class="dm-file-picker">
                            <label class="slds-form-element__label">Pick a file</label>
                            <input type="file" onchange={handleFilePicked} class="dm-file-input" />
                            <template if:true={uploadFileName}>
                                <p class="slds-text-body_small slds-m-top_x-small">
                                    Selected: <strong>{uploadFileName}</strong> ({uploadFileSizeKB} KB)
                                </p>
                            </template>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={closeUploadModal}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleUploadSubmit} disabled={isUploadDisabled}>
                            <template if:true={isUploading}>Uploading...</template>
                            <template if:false={isUploading}>Upload</template>
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- ======== New Folder modal ======== -->
        <template if:true={showNewFolderModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={closeNewFolderModal} title="Close">
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium">New Folder</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-text-body_regular">
                            Folders map to picklist values on the <strong>Document.Category</strong> field.
                            To add a new folder, an admin needs to add a new value in:
                        </p>
                        <p class="slds-text-body_regular slds-m-top_small slds-text-color_weak">
                            Setup &rarr; Object Manager &rarr; Document &rarr; Fields &amp; Relationships &rarr; Category &rarr; <em>New</em>
                        </p>
                        <p class="slds-text-body_regular slds-m-top_small">
                            Once the picklist value is added and saved, it will automatically appear as a new folder card on this page.
                        </p>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_brand" onclick={closeNewFolderModal}>Got it</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </div>
</template>
