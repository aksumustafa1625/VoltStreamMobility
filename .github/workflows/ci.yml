name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------------------------------------------------------------------------
  # Lint job: always runs, no secrets needed.
  #
  # Runs PMD against the Apex source so a recruiter or contributor sees
  # green-on-every-PR static analysis without having to set up a DevHub.
  # ---------------------------------------------------------------------------
  lint:
    name: PMD static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java (PMD requires JRE 11+)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache PMD
        id: cache-pmd
        uses: actions/cache@v4
        with:
          path: pmd
          key: pmd-7.7.0

      - name: Install PMD 7.7.0
        if: steps.cache-pmd.outputs.cache-hit != 'true'
        run: |
          curl -sSL "https://github.com/pmd/pmd/releases/download/pmd_releases%2F7.7.0/pmd-dist-7.7.0-bin.zip" -o pmd.zip
          unzip -q pmd.zip
          mv pmd-bin-* pmd

      - name: Run PMD on Apex
        run: |
          ./pmd/bin/pmd check \
            --dir force-app/main/default/classes \
            --dir force-app/main/default/triggers \
            --rulesets pmd-ruleset.xml \
            --format text \
            --no-fail-on-violation
        # `--no-fail-on-violation` keeps CI green while we tune the ruleset;
        # remove the flag once the codebase is clean to make violations a hard
        # CI failure.

  # ---------------------------------------------------------------------------
  # Deploy + test job: only runs when the SFDX_AUTH_URL secret is configured.
  #
  # Authorizes a DevHub via the secret, spins up a 1-day scratch org, deploys
  # the project, assigns the permission set, and runs the full test suite with
  # code coverage. The scratch org is deleted at the end so we don't blow
  # through scratch-org limits.
  #
  # Setup (one-time) — see CONTRIBUTING.md for full instructions:
  #   1. sf org login web --set-default-dev-hub
  #   2. sf org display --target-org <DevHub> --verbose --json
  #      Copy the `sfdxAuthUrl` value.
  #   3. Add it as a repo secret named SFDX_AUTH_URL.
  # ---------------------------------------------------------------------------
  scratch-org-tests:
    name: Scratch org deploy + test
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Skip if SFDX_AUTH_URL secret is not configured
        id: gate
        run: |
          if [ -z "${{ secrets.SFDX_AUTH_URL }}" ]; then
            echo "Skipping scratch-org tests: SFDX_AUTH_URL secret is not set."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        if: steps.gate.outputs.skip != 'true'
        run: npm install -g @salesforce/cli

      - name: Authorize DevHub
        if: steps.gate.outputs.skip != 'true'
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > authurl.txt
          sf org login sfdx-url --sfdx-url-file authurl.txt --alias DevHub --set-default-dev-hub
          rm authurl.txt

      - name: Create scratch org
        if: steps.gate.outputs.skip != 'true'
        run: |
          sf org create scratch \
            --definition-file config/project-scratch-def.json \
            --alias VoltStreamCI \
            --duration-days 1 \
            --set-default

      - name: Deploy source
        if: steps.gate.outputs.skip != 'true'
        run: sf project deploy start --source-dir force-app

      - name: Assign permission set
        if: steps.gate.outputs.skip != 'true'
        run: sf org assign permset --name VoltStream_Reseller_Access

      - name: Run Apex tests with coverage
        if: steps.gate.outputs.skip != 'true'
        run: |
          sf apex run test \
            --test-level RunLocalTests \
            --code-coverage \
            --result-format human \
            --synchronous \
            --wait 10

      - name: Delete scratch org
        if: always() && steps.gate.outputs.skip != 'true'
        run: sf org delete scratch --no-prompt --target-org VoltStreamCI || true
